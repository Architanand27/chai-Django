{% extends "layout.html" %}

{% block content %}
<h1 class="bg-orange-300 text-3xl text-green-800">Chai restro..</h1>

<div class="grid grid-cols-3 gap-4 m-4 align-middle">
    {% for chai in chais %}
    <div class="bg-gray-800 p-5 rounded">
        <img class="rounded shadow-lg" src="{{chai.image.url}}" alt="not found the img">
        <div class="flex p-4 justify-between ">
            <h3 class="text-2xl p-2">{{chai.name}}</h3>
            <span class="px-3 py-1 bg-green-100 text-green-800 rounded-full pt-3">
                Price:- ₹{{chai.price}}
            </span>
        </div>

        
        <a href=" {% url 'chai_details' chai.id %}">
            <button class="inline-flex items-center w-[100%] justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-orange-600 ☐ hover:bg-orange-700 focus: outline-none focus: ring-2 focus: ring-offset-2 focus:ring-orange-500">
                {{chai.type}} - {{chai.id}}
            </button>
        </a>
    </div>
    

    {% endfor %}
</div>

{% endblock %}

{% block title %}
resturent



{% endblock %}
